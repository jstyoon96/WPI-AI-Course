run:
  project: bspm_reconstruction
  seed: 42
  mode: audit
  output_dir: experiments

stage:
  name: data_audit
  allow_full_training: false

data:
  name: dalhousie_superfile_bspm
  version: extracted_dal_bspm_v1
  split_version: unsplit_audit_v1
  raw_path: /home/gyoon/datasets/Dal_BSPM/Dal_BSPM/892_BSPM/superfile
  node_label_path: /home/gyoon/datasets/Dal_BSPM/Dal_BSPM/node_label.xlsx
  readme_path: /home/gyoon/datasets/Dal_BSPM/Dal_BSPM/readme.txt
  reference_pdf_path: /home/gyoon/datasets/Dal_BSPM/Dal_BSPM/nodes120leads.pdf
  record_glob: "node*.txt"
  node_count: 352
  input_selection_universe: node_120
  primary_target_nodes: node_120
  future_target_nodes: node_352
  limb_electrodes: [RA, LA, LL]
  segment_flags: [p_wave, p_t, qrs, q_t, j_t]
  sparse_node_counts: [3, 6, 8, 12, 16, 24, 32, 48, 64, 120]
  batch_size: 32
  num_workers: 4

model:
  name: ridge_reconstruction_baseline
  family: linear_reconstruction
  params: {}

loss:
  name: reconstruction_mse
  weights: {}

trainer:
  max_epochs: 50
  precision: bf16
  grad_clip: 1.0
  early_stopping: true

eval:
  primary_metric: segment_balanced_nRMSE_exploratory
  metric_status: exploratory_candidate_selection_only
  candidate_metric_weights:
    qrs_nRMSE: 0.45
    stt_nRMSE: 0.25
    p_nRMSE: 0.15
    all_nRMSE: 0.15
  sentinel_policy: exclude_9999_rows_for_exploratory_candidate_scores
  secondary_metrics:
    - spatial_rms_error_uV
    - frame_spatial_correlation
    - normalized_rmse
    - per_node_nRMSE
    - segment_nRMSE
    - derived_12lead_correlation
  safety_metrics:
    - qrs_segment_error
    - st_segment_error

candidate_selection:
  version: candidate_selection_v1
  target: node_120
  selection_universe: node_120
  output_dir: examples/bspm/experiments/candidate_selection_v1
  report_dir: examples/bspm/reports/candidate_selection_v1
  output_files:
    - summary.csv
    - selected_nodes.csv
    - per_node_metrics.csv
    - segment_metrics.csv
    - run_manifest.json
    - report.md
  methods:
    - random
    - pca_qr
    - forward_greedy
  worker_count: 1
  validation_methods:
    - backward_checkpoint
    - k3_exhaustive_subset
  k_values: [3, 6, 8, 12, 16, 24, 32, 48, 64]

logging:
  save_every_n_epochs: 5
  log_artifacts: true
