run:
  project: generic_ml_harness
  seed: 42
  mode: train
  output_dir: experiments

stage:
  name: smoke
  allow_full_training: false

data:
  name: default_dataset
  version: v1
  split_version: split_v1
  batch_size: 32
  num_workers: 4

model:
  name: baseline
  family: default
  params: {}

loss:
  name: default
  weights: {}

trainer:
  max_epochs: 50
  precision: bf16
  grad_clip: 1.0
  early_stopping: true

eval:
  primary_metric: val_score
  secondary_metrics: []
  safety_metrics: []

logging:
  save_every_n_epochs: 5
  log_artifacts: true

