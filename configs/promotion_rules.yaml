stage_0_static_checks:
  required:
    - unit_tests_pass
    - config_valid
    - no_forbidden_files_changed

stage_1_smoke:
  max_runtime_minutes: 20
  required:
    - no_nan_loss
    - forward_backward_pass
    - eval_runs_successfully

stage_2_proxy:
  max_runtime_hours: 2
  promote_if:
    primary_proxy_metric_delta: ">= 0.3"
    safety_metric_drop: "<= 0.1"

stage_3_full:
  requires_human_approval: true
  max_runtime_hours: 20

